<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa da Saúde - Unidades de Saúde do Brasil</title>

    <!-- Leaflet CSS-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- Leaflet JS-->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- CSS Principal-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!--Barra Lateral-->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>
                    <span class="icon">🏥</span>
                    Mapa da Saúde
                </h1>
                <div class="subtitle">Encontre unidades de saúde próximas a você</div>
            </div>

            <!-- 🔧 Context Message (adicionado para completar) -->
            <div id="context-message" class="context-message">
                <p>💡 Clique no botão abaixo para carregar os dados do sistema e começar a busca</p>
            </div>

            <!--Botão de Gatilho-->
            <div class="trigger-container">
                <button id="btn-iniciar" class="btn-start">
                    <span class="btn-icon">🚀</span>
                    Carregar Dados do Sistema
                </button>
            </div>

            <!--Filtros-->
            <div id="filter-container" class="filters-container" style="display: none;"> 
                <div class="filters">
                    <div class="filter-group">
                        <label for="estado">Estado</label>
                        <select id="estado" class="filter-select">
                            <option value="">Selecione um estado</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="cidade">Cidade</label>
                        <select id="cidade" class="filter-select" disabled>
                            <option value="">Primeiro selecione um estado</option>
                        </select>
                    </div>
                </div>
            </div>

            <!--Loading Indicator-->
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Carregando unidades de saúde...</p>
            </div>

            <!--Error Message-->
            <div id="error-message" class="error-message" style="display: none;"></div>

            <!--Cards Container-->
            <div id="cards-container" class="cards-container">
                <div class="empty-state">
                    <span class="empty-icon">📍</span>
                    <p>Clique em "Carregar Dados do Sistema<br>para começar a busca</p>
                </div>
            </div>
        </aside>

        <!--Mapa-->
        <main class="map-container">
            <div id="map" class="map"></div>
        </main>
    </div>

    <!--Script Principal-->
    <script src="script.js"></script>
</body>
</html>
